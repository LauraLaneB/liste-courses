<!DOCTYPE html>
<html>
<head>
  <style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 15px;
  background-color: #f5f5f5;
}

h1 {
  text-align: center;
}

#recettes {
  margin-bottom: 20px;
}

.recette {
  display: flex;
  align-items: center;
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  font-size: 18px;
}

.recette input {
  margin-right: 10px;
  transform: scale(1.5);
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background-color: #4CAF50;
  color: white;
}

button:hover {
  background-color: #45a049;
}

#courses {
  list-style: none;
  padding: 0;
}

#courses li {
  background: white;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  font-size: 18px;
}
</style>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Liste de courses</title>
</head>
<body>

<h1>Mes recettes</h1>

<div id="recettes"></div>

<button onclick="genererListe()">Générer ma liste</button>

<h2>Liste de courses</h2>
<ul id="courses"></ul>

<script>
let recettes = [
  {
    nom: "Omelette",
    ingredients: [
      { nom: "oeuf", quantite: 2, unite: "pièce", ordre: 1 },
      { nom: "lait", quantite: 10, unite: "cl", ordre: 2 }
    ]
  },
  {
    nom: "Pancakes",
    ingredients: [
      { nom: "oeuf", quantite: 3, unite: "pièce", ordre: 1 },
      { nom: "lait", quantite: 20, unite: "cl", ordre: 2 }
    ]
  }
];

function afficherRecettes() {
  let div = document.getElementById("recettes");
  div.innerHTML = "";

  recettes.forEach((r, index) => {
    let container = document.createElement("div");
    container.className = "recette";

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.id = "recette_" + index;

    let label = document.createElement("label");
    label.innerText = r.nom;

    container.appendChild(checkbox);
    container.appendChild(label);

    div.appendChild(container);
  });
}


function genererListe() {
  let liste = {};

  recettes.forEach((r, index) => {
    let checked = document.getElementById("recette_" + index).checked;

    if (checked) {
      r.ingredients.forEach(ing => {
        if (liste[ing.nom]) {
          liste[ing.nom].quantite += ing.quantite;
        } else {
          liste[ing.nom] = { ...ing };
        }
      });
    }
  });

  let ul = document.getElementById("courses");
  ul.innerHTML = "";

  Object.values(liste)
    .sort((a, b) => a.ordre - b.ordre)
    .forEach(ing => {
      let li = document.createElement("li");
      li.innerText = `${ing.nom} : ${ing.quantite} ${ing.unite}`;
      ul.appendChild(li);
    });
}

afficherRecettes();
</script>

</body>
</html>
