<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liste de courses</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f5f5f5;
}
body {
  padding-bottom: 80px;
}

h1 {
  text-align: center;
}

h2 {
  user-select: none;
}
.rayon-titre {
  font-weight: bold;
  font-size: 20px;
  margin-top: 20px;
  background: transparent;
  color: #333;
  border-bottom: 2px solid #ddd;
  padding-bottom: 5px;
  pointer-events: none; /* empêche le clic */
}

.recette {
  display: flex;
  align-items: center;
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  font-size: 18px;
}

  .recette {
  justify-content: space-between;
}

.recette input[type="checkbox"] {
  margin-right: 10px;
  transform: scale(1.5);
}

.recette input[type="number"] {
  width: 50px;
  text-align: center;
  margin-left: auto;
  transform: none;
}
  
.search-container {
  position: fixed;
  top: 10;
  left: 0;
  width: 100%;
  padding: 10px;
  background: #f5f5f5;
  z-index: 1000;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

#searchRecette {
  width: 90%;
  margin: 0 auto;
  display: block;
  padding: 10px 35px 10px 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
  font-size: 16px;
}

#clearSearch {
  position: absolute;
  right: 25px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 18px;
  color: #888;

  background: #eee;
  width: 22px;
  height: 22px;
  border-radius: 50%;

  display: none; /* important */
  align-items: center;
  justify-content: center;
}


body {
  padding-top: 70px;
}

.floating-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: auto;
  padding: 15px 20px;
  border-radius: 50px;
  font-size: 16px;
  z-index: 1000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
}

.secondary {
  background: #888;
}

.delete-btn {
  background: #ff5252;
}

#courses {
  list-style: none;
  padding: 0;
}

#courses li {
  background: white;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  font-size: 18px;
}

.checked {
  text-decoration: line-through;
  opacity: 0.5;
}

.form-card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.form-card input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.ingredient-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  gap: 5px;
}

  .recette button {
  padding: 5px;
  font-size: 18px;
  border-radius: 8px;
}
.header-recettes {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.reset-btn {
  width: auto;
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 8px;
  background: #ff5252;
}
.reset-btn {
  background: transparent;
  color: #ff5252;
  font-size: 20px;
  padding: 5px;
}

</style>
</head>

<body>

<h2 onclick="toggleForm()" style="cursor:pointer;">
➕ Nouvelle recette <span id="arrow">▼</span>
</h2>

<div id="formContainer" style="display:none;">
  <div class="form-card">
    <input id="nomRecette" placeholder="Nom de la recette">
    <div id="ingredientsForm"></div>
    <button class="secondary" onclick="ajouterIngredient()">+ Ajouter un ingrédient</button>
    <button onclick="sauvegarderRecette()">Enregistrer la recette</button>
  </div>
</div>

<div class="header-recettes">
  <h1>🛒 Mes recettes</h1>
  <button class="reset-btn" onclick="toutDecocher()">❌</button>
</div>


<div class="search-container">
  <input 
    type="text" 
    id="searchRecette" 
    placeholder="🔍 Rechercher..." 
    oninput="handleSearchInput()"
  >
  <span id="clearSearch" onclick="clearSearch()">✕</span>
</div>



  
  <div id="recettes"></div>

<button class="floating-btn" onclick="genererListe()">
  🛒 Générer
</button>


<button onclick="copierListe()">Copier la liste</button>

<h2>Liste de courses</h2>
<ul id="courses"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// =====================
// SUPABASE
// =====================
const supabaseUrl = "https://napdbjcoqgyasyolmxzm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hcGRiamNvcWd5YXN5b2xteHptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk1ODMsImV4cCI6MjA5MjU0NTU4M30.7ogpMMEeuLuoffJ93ZC-Sl8IROOP_fRf8ocqVJi80oU";
const client = supabase.createClient(supabaseUrl, supabaseKey);

// =====================
// RAYONS
// =====================
const rayons = [
  { nom: "Viandes et poisson", ordre: 1 },
  { nom: "Fruits Légumes", ordre: 2 },
  { nom: "Pains pâtisseries", ordre: 3 },
  { nom: "Lait oeuf fromages", ordre: 4 },
  { nom: "Charcuterie Traiteur", ordre: 5 },
  { nom: "Surgelé", ordre: 6 },
  { nom: "Épicerie salée", ordre: 7 },
  { nom: "Épicerie sucrée", ordre: 8 },
  { nom: "Boisson", ordre: 9 }
];

// =====================
// VARIABLES
// =====================
let recettes = [];
let portions = {};
let recettesSelectionnees = {};


// =====================
// TOGGLE FORM
// =====================
function toggleForm() {
  let form = document.getElementById("formContainer");
  let arrow = document.getElementById("arrow");

  if (form.style.display === "none") {
    form.style.display = "block";
    arrow.innerText = "▲";
  } else {
    form.style.display = "none";
    arrow.innerText = "▼";
  }
}

// =====================
// AJOUT INGREDIENT
// =====================
function ajouterIngredient() {
  let div = document.getElementById("ingredientsForm");

  let options = rayons.map(r => `<option value="${r.ordre}">${r.nom}</option>`).join("");

  let container = document.createElement("div");
  container.className = "ingredient-row";

  container.innerHTML = `
    <input placeholder="Nom">
    <input type="number" placeholder="Qté">
    <input placeholder="Unité">
    <select>${options}</select>
    <button class="delete-btn">✕</button>
  `;

  container.querySelector("button").onclick = () => container.remove();

  div.appendChild(container);
}

// =====================
// SAUVEGARDE RECETTE
// =====================
async function sauvegarderRecette() {

  let nom = document.getElementById("nomRecette").value;
  let blocs = document.getElementById("ingredientsForm").children;

  let ingredients = [];

  for (let bloc of blocs) {
    let inputs = bloc.querySelectorAll("input");
    let select = bloc.querySelector("select");

    if (!inputs[0].value.trim()) continue;

    ingredients.push({
      nom: inputs[0].value,
      quantite: parseFloat(inputs[1].value) || 0,
      unite: inputs[2].value,
      ordre: parseInt(select.value)
    });
  }

  let { data: recette } = await client
    .from("recettes")
    .insert([{ nom }])
    .select()
    .single();

  let ingredientsAvecID = ingredients.map(i => ({
    ...i,
    recette_id: recette.id
  }));

  await client.from("ingredients").insert(ingredientsAvecID);

  // reset + fermeture
  document.getElementById("nomRecette").value = "";
  document.getElementById("ingredientsForm").innerHTML = "";
  document.getElementById("formContainer").style.display = "none";
  document.getElementById("arrow").innerText = "▼";

  await chargerRecettes();

  alert("Recette enregistrée !");
}

// =====================
// CHARGER RECETTES
// =====================
async function chargerRecettes() {

  let { data: recettesData } = await client.from("recettes").select("*");
  let { data: ingredientsData } = await client.from("ingredients").select("*");

  recettes = recettesData.map(r => ({
    ...r,
    ingredients: ingredientsData.filter(i => i.recette_id === r.id)
  }));

  afficherRecettes();
}

// =====================
// AFFICHER RECETTES
// =====================
function afficherRecettes() {
  let div = document.getElementById("recettes");
  div.innerHTML = "";

  let recherche = document.getElementById("searchRecette").value.toLowerCase();

  // ✅ TRI + FILTRE
  let recettesFiltrees = recettes
    .sort((a, b) => a.nom.localeCompare(b.nom, 'fr', { sensitivity: 'base' }))
    .filter(r => r.nom.toLowerCase().includes(recherche));

recettesFiltrees.forEach((r) => {
  let index = recettes.indexOf(r);

    let container = document.createElement("div");
    container.className = "recette";

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.id = "recette_" + index;

    let label = document.createElement("label");
    label.innerText = r.nom;
    label.style.flex = "1";

    // container pour boutons +/- (caché au début)
    let qtyContainer = document.createElement("div");
    qtyContainer.style.display = "none";
    qtyContainer.style.alignItems = "center";
    qtyContainer.style.gap = "5px";

    let btnMoins = document.createElement("button");
    btnMoins.innerText = "−";
    btnMoins.style.width = "40px";

    let span = document.createElement("span");
    span.innerText = "1";
    span.style.minWidth = "20px";
    span.style.textAlign = "center";

    let btnPlus = document.createElement("button");
    btnPlus.innerText = "+";
    btnPlus.style.width = "40px";

    // valeur initiale
    portions[index] = 1;

    btnPlus.onclick = () => {
      portions[index]++;
      span.innerText = portions[index];
    };

    btnMoins.onclick = () => {
      if (portions[index] > 1) {
        portions[index]--;
        span.innerText = portions[index];
      }
    };

    // afficher/masquer
// restaurer état
checkbox.checked = recettesSelectionnees[index] || false;
qtyContainer.style.display = checkbox.checked ? "flex" : "none";

checkbox.onchange = () => {
  recettesSelectionnees[index] = checkbox.checked;

  if (checkbox.checked) {
    qtyContainer.style.display = "flex";
  } else {
    qtyContainer.style.display = "none";
    portions[index] = 1;
    span.innerText = "1";
  }
};


    qtyContainer.appendChild(btnMoins);
    qtyContainer.appendChild(span);
    qtyContainer.appendChild(btnPlus);

    container.appendChild(checkbox);
    container.appendChild(label);
    container.appendChild(qtyContainer);

    div.appendChild(container);
  });
}



  function clearSearch() {
  let input = document.getElementById("searchRecette");
  input.value = "";
  document.getElementById("clearSearch").style.display = "none";
  afficherRecettes();
}

function handleSearchInput() {
  let input = document.getElementById("searchRecette");
  let clearBtn = document.getElementById("clearSearch");

  clearBtn.style.display = input.value ? "block" : "none";

  afficherRecettes();
}
function toutDecocher() {

  // 1. reset des sélections
  recettesSelectionnees = {};

  // 2. reset des portions
  portions = {};

  // 3. vider la liste affichée
  let ul = document.getElementById("courses");
  ul.innerHTML = "";

  // 4. vider le localStorage
  localStorage.removeItem("listeCourses");

  // 5. rafraîchir l'affichage des recettes
  afficherRecettes();
}


// =====================
// GENERER LISTE
// =====================
function genererListe() {

  let liste = {};

recettes.forEach((r, index) => {
let checked = recettesSelectionnees[index];

  if (checked) {
    let coef = portions[index] || 1;

    r.ingredients.forEach(ing => {
      let quantite = ing.quantite * coef;

      if (liste[ing.nom]) {
        liste[ing.nom].quantite += quantite;
      } else {
        liste[ing.nom] = {
          ...ing,
          quantite: quantite
        };
      }
    });
  }
});


  let ul = document.getElementById("courses");
  ul.innerHTML = "";

  let groupes = {};

  Object.values(liste).forEach(ing => {
    if (!groupes[ing.ordre]) groupes[ing.ordre] = [];
    groupes[ing.ordre].push(ing);
  });

  Object.keys(groupes).sort((a,b)=>a-b).forEach(ordre => {

    let rayon = rayons.find(r => r.ordre == ordre);

let titre = document.createElement("li");
titre.innerText = "🛍️ " + (rayon ? rayon.nom : "Autre");
titre.className = "rayon-titre";


    ul.appendChild(titre);

    groupes[ordre].forEach(ing => {
      let li = document.createElement("li");
      li.innerText = `${ing.nom} : ${ing.quantite} ${ing.unite}`;

      li.onclick = () => {
        li.classList.toggle("checked");
        sauvegarderEtat();
      };

      ul.appendChild(li);
    });

  });

  sauvegarderEtat();
}

// =====================
// COPIER
// =====================
function copierListe() {
  let texte = [...document.querySelectorAll("#courses li")]
    .map(li => li.innerText)
    .join("\n");

  navigator.clipboard.writeText(texte);
  alert("Liste copiée !");
}

// =====================
// SAUVEGARDE LOCAL
// =====================
function sauvegarderEtat() {
  let items = [...document.querySelectorAll("#courses li")].map(li => ({
    texte: li.innerText,
    checked: li.classList.contains("checked")
  }));

  localStorage.setItem("listeCourses", JSON.stringify(items));
}

// =====================
// RESTAURATION
// =====================
function restaurerEtat() {
  let data = localStorage.getItem("listeCourses");
  if (!data) return;

  let ul = document.getElementById("courses");
  ul.innerHTML = "";

  JSON.parse(data).forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.texte;

    if (item.checked) li.classList.add("checked");

    li.onclick = () => {
      li.classList.toggle("checked");
      sauvegarderEtat();
    };

    ul.appendChild(li);
  });
}

// =====================
// INIT
// =====================
chargerRecettes();
restaurerEtat();

</script>

</body>
</html>
