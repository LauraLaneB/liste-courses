```html
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste de courses</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #recettes {
      margin-bottom: 20px;
    }

    .recette {
      display: flex;
      align-items: center;
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      font-size: 18px;
    }

    .recette input {
      margin-right: 10px;
      transform: scale(1.5);
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background-color: #4CAF50;
      color: white;
    }

    button:last-of-type {
      background-color: #2196F3;
    }

    #courses {
      list-style: none;
      padding: 0;
    }

    #courses li {
      background: white;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      font-size: 18px;
      transition: all 0.2s;
    }

    #courses li:active {
      transform: scale(0.98);
    }

    .checked {
      text-decoration: line-through;
      opacity: 0.5;
    }
  </style>
</head>

<body>
<h2>➕ Ajouter une recette</h2>

<input id="nomRecette" placeholder="Nom de la recette">

<div id="ingredientsForm"></div>

<button onclick="ajouterIngredient()">+ Ajouter ingrédient</button>
<button onclick="sauvegarderRecette()">Enregistrer la recette</button>

<h1>🛒 Mes recettes</h1>

<div id="recettes"></div>

<button onclick="genererListe()">Générer ma liste</button>
<button onclick="copierListe()">Copier la liste</button>

<h2>Liste de courses</h2>
<ul id="courses"></ul>

<script>

// =====================
// AJOUTER INGREDIENTS
// =====================
function ajouterIngredient() {
  let div = document.getElementById("ingredientsForm");

  let container = document.createElement("div");

  container.innerHTML = `
    <input placeholder="Nom">
    <input type="number" placeholder="Quantité">
    <input placeholder="Unité">
    <input type="number" placeholder="Ordre rayon">
  `;

  div.appendChild(container);
}
// =====================
// SAUVEGARDER RECETTE
// =====================
function sauvegarderRecette() {
  let nom = document.getElementById("nomRecette").value;
  let blocs = document.getElementById("ingredientsForm").children;

  let ingredients = [];

  for (let bloc of blocs) {
    let inputs = bloc.querySelectorAll("input");

    ingredients.push({
      nom: inputs[0].value,
      quantite: parseFloat(inputs[1].value),
      unite: inputs[2].value,
      ordre: parseInt(inputs[3].value)
    });
  }

  let nouvelleRecette = {
    nom: nom,
    ingredients: ingredients
  };

  recettes.push(nouvelleRecette);

  localStorage.setItem("recettes", JSON.stringify(recettes));

  alert("Recette enregistrée !");

  afficherRecettes();
}

  
  
// =====================
// DONNÉES (à personnaliser)
// =====================
let recettes = JSON.parse(localStorage.getItem("recettes")) || [];
if (recettes.length === 0) {
  recettes = [
    {
      nom: "Omelette",
      ingredients: [
        { nom: "oeuf", quantite: 2, unite: "pièce", ordre: 1 }
      ]
    }
  ];
}


// =====================
// AFFICHAGE RECETTES
// =====================
function afficherRecettes() {
  let div = document.getElementById("recettes");
  div.innerHTML = "";

  recettes.forEach((r, index) => {
    let container = document.createElement("div");
    container.className = "recette";

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.id = "recette_" + index;

    let label = document.createElement("label");
    label.innerText = r.nom;

    container.appendChild(checkbox);
    container.appendChild(label);

    div.appendChild(container);
  });
}

// =====================
// GENERER LISTE
// =====================
function genererListe() {
  let liste = {};

  recettes.forEach((r, index) => {
    let checked = document.getElementById("recette_" + index).checked;

    if (checked) {
      r.ingredients.forEach(ing => {
        if (liste[ing.nom]) {
          liste[ing.nom].quantite += ing.quantite;
        } else {
          liste[ing.nom] = { ...ing };
        }
      });
    }
  });

  let ul = document.getElementById("courses");
  ul.innerHTML = "";

  Object.values(liste)
    .sort((a, b) => a.ordre - b.ordre)
    .forEach(ing => {
      let li = document.createElement("li");
      li.innerText = `${ing.nom} : ${ing.quantite} ${ing.unite}`;

      li.onclick = () => {
        li.classList.toggle("checked");
        sauvegarderEtat();
      };

      ul.appendChild(li);
    });

  sauvegarderEtat();
}

// =====================
// COPIER LISTE
// =====================
function copierListe() {
  let items = document.querySelectorAll("#courses li");
  let texte = "";

  items.forEach(li => {
    texte += li.innerText + "\n";
  });

  navigator.clipboard.writeText(texte);
  alert("Liste copiée !");
}

// =====================
// SAUVEGARDE
// =====================
function sauvegarderEtat() {
  let items = document.querySelectorAll("#courses li");
  let etat = [];

  items.forEach(li => {
    etat.push({
      texte: li.innerText,
      checked: li.classList.contains("checked")
    });
  });

  localStorage.setItem("listeCourses", JSON.stringify(etat));
}

// =====================
// RESTAURATION
// =====================
function restaurerEtat() {
  let data = localStorage.getItem("listeCourses");
  if (!data) return;

  let etat = JSON.parse(data);
  let ul = document.getElementById("courses");
  ul.innerHTML = "";

  etat.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.texte;

    if (item.checked) {
      li.classList.add("checked");
    }

    li.onclick = () => {
      li.classList.toggle("checked");
      sauvegarderEtat();
    };

    ul.appendChild(li);
  });
}

// =====================
// INIT
// =====================
afficherRecettes();
restaurerEtat();

</script>

</body>
</html>
