
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste de courses</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #recettes {
      margin-bottom: 20px;
    }

    .recette {
      display: flex;
      align-items: center;
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      font-size: 18px;
    }

    .recette input {
      margin-right: 10px;
      transform: scale(1.5);
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background-color: #4CAF50;
      color: white;
    }

    button:last-of-type {
      background-color: #2196F3;
    }

    #courses {
      list-style: none;
      padding: 0;
    }

    #courses li {
      background: white;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      font-size: 18px;
      transition: all 0.2s;
    }

    #courses li:active {
      transform: scale(0.98);
    }

    .checked {
      text-decoration: line-through;
      opacity: 0.5;
    }
    .form-card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.form-card input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.ingredient-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  gap: 5px;
  margin-bottom: 10px;
}

.ingredient-row input {
  margin: 0;
}

.delete-btn {
  background-color: #ff5252;
  color: white;
  border: none;
  border-radius: 8px;
}

.secondary {
  background-color: #888;
}
select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

  </style>
</head>

<body>
<h2>➕ Nouvelle recette</h2>

<div class="form-card">

  <input id="nomRecette" placeholder="Nom de la recette">

  <div id="ingredientsForm"></div>

  <button class="secondary" onclick="ajouterIngredient()">+ Ajouter un ingrédient</button>

  <button onclick="sauvegarderRecette()">Enregistrer la recette</button>

</div>


<h1>🛒 Mes recettes</h1>

<div id="recettes"></div>

<button onclick="genererListe()">Générer ma liste</button>
<button onclick="copierListe()">Copier la liste</button>

<h2>Liste de courses</h2>
<ul id="courses"></ul>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// =====================
// CONNECTION BASE DONNEES SUPABASE
// =====================
  
const supabaseUrl = "https://napdbjcoqgyasyolmxzm.supabase.co/rest/v1/";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hcGRiamNvcWd5YXN5b2xteHptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk1ODMsImV4cCI6MjA5MjU0NTU4M30.7ogpMMEeuLuoffJ93ZC-Sl8IROOP_fRf8ocqVJi80oU";
const client = supabase.createClient(supabaseUrl, supabaseKey);


// =====================
// LISTE RAYONS
// =====================
const rayons = [
  { nom: "Viandes et poisson", ordre: 1 },
  { nom: "Fruits Légumes", ordre: 2 },
  { nom: "Pains pâtisseries", ordre: 3 },
  { nom: "Lait oeuf fromages", ordre: 4 },
  { nom: "Charcuterie Traiteur", ordre: 5 },  
  { nom: "Surgélé", ordre: 6 },
  { nom: "Conserve Epicerie salé Sauce", ordre: 7 },
  { nom: "Epicerie sucrée", ordre: 8 },
  { nom: "Boisson", ordre: 9 }
];

  
// =====================
// AJOUTER INGREDIENTS
// =====================
function ajouterIngredient() {
  let div = document.getElementById("ingredientsForm");

  let container = document.createElement("div");
  container.className = "ingredient-row";

  let options = rayons.map(r => `<option value="${r.ordre}">${r.nom}</option>`).join("");

  container.innerHTML = `
    <input placeholder="Nom">
    <input type="number" placeholder="Qté">
    <input placeholder="Unité">
    <select>${options}</select>
    <button class="delete-btn">✕</button>
  `;

  container.querySelector("button").onclick = () => {
    container.remove();
  };

  div.appendChild(container);
}


// =====================
// SAUVEGARDER RECETTE
// =====================
async function sauvegarderRecette() {
  let nom = document.getElementById("nomRecette").value;
  let blocs = document.getElementById("ingredientsForm").children;

  let ingredients = [];

  for (let bloc of blocs) {
    let inputs = bloc.querySelectorAll("input");
    let select = bloc.querySelector("select");

    if (inputs[0].value.trim() === "") continue;

    ingredients.push({
      nom: inputs[0].value,
      quantite: parseFloat(inputs[1].value) || 0,
      unite: inputs[2].value,
      ordre: parseInt(select.value)
    });
  }

  // 1. insérer recette
  let { data: recette, error } = await supabase
    .from("recettes")
    .insert([{ nom: nom }])
    .select()
    .single();

  if (error) {
    alert("Erreur recette");
    return;
  }

  // 2. insérer ingrédients
  let ingredientsAvecID = ingredients.map(i => ({
    ...i,
    recette_id: recette.id
  }));

  await supabase.from("ingredients").insert(ingredientsAvecID);

  alert("Recette enregistrée !");
}


document.getElementById("nomRecette").value = "";
document.getElementById("ingredientsForm").innerHTML = "";

// =====================
// CHARGER LES RECETTES
// =====================
async function chargerRecettes() {
  let { data: recettesData } = await supabase.from("recettes").select("*");

  let { data: ingredientsData } = await supabase.from("ingredients").select("*");

  recettes = recettesData.map(r => {
    return {
      nom: r.nom,
      id: r.id,
      ingredients: ingredientsData.filter(i => i.recette_id === r.id)
    };
  });

  afficherRecettes();
}


  
// =====================
// DONNÉES (à personnaliser)
// =====================
let recettes = JSON.parse(localStorage.getItem("recettes")) || [];
if (recettes.length === 0) {
  recettes = [
    {
      nom: "Omelette",
      ingredients: [
        { nom: "oeuf", quantite: 2, unite: "pièce", ordre: 1 }
      ]
    }
  ];
}


// =====================
// AFFICHAGE RECETTES
// =====================
function afficherRecettes() {
  let div = document.getElementById("recettes");
  div.innerHTML = "";

  recettes.forEach((r, index) => {
    let container = document.createElement("div");
    container.className = "recette";

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.id = "recette_" + index;

    let label = document.createElement("label");
    label.innerText = r.nom;

    container.appendChild(checkbox);
    container.appendChild(label);

    div.appendChild(container);
  });
}

// =====================
// GENERER LISTE
// =====================
function genererListe() {
  let liste = {};

  recettes.forEach((r, index) => {
    let checked = document.getElementById("recette_" + index).checked;

    if (checked) {
      r.ingredients.forEach(ing => {
        if (liste[ing.nom]) {
          liste[ing.nom].quantite += ing.quantite;
        } else {
          liste[ing.nom] = { ...ing };
        }
      });
    }
  });

  let ul = document.getElementById("courses");
  ul.innerHTML = "";

  Object.values(liste)
    .sort((a, b) => a.ordre - b.ordre)
    .forEach(ing => {
      let li = document.createElement("li");
      li.innerText = `${ing.nom} : ${ing.quantite} ${ing.unite}`;

      li.onclick = () => {
        li.classList.toggle("checked");
        sauvegarderEtat();
      };

      ul.appendChild(li);
    });

  sauvegarderEtat();
}

// =====================
// COPIER LISTE
// =====================
function copierListe() {
  let items = document.querySelectorAll("#courses li");
  let texte = "";

  items.forEach(li => {
    texte += li.innerText + "\n";
  });

  navigator.clipboard.writeText(texte);
  alert("Liste copiée !");
}

// =====================
// SAUVEGARDE
// =====================
function sauvegarderEtat() {
  let items = document.querySelectorAll("#courses li");
  let etat = [];

  items.forEach(li => {
    etat.push({
      texte: li.innerText,
      checked: li.classList.contains("checked")
    });
  });

  localStorage.setItem("listeCourses", JSON.stringify(etat));
}

// =====================
// RESTAURATION
// =====================
function restaurerEtat() {
  let data = localStorage.getItem("listeCourses");
  if (!data) return;

  let etat = JSON.parse(data);
  let ul = document.getElementById("courses");
  ul.innerHTML = "";

  etat.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.texte;

    if (item.checked) {
      li.classList.add("checked");
    }

    li.onclick = () => {
      li.classList.toggle("checked");
      sauvegarderEtat();
    };

    ul.appendChild(li);
  });
}

// =====================
// INIT
// =====================
chargerRecettes();
restaurerEtat();

</script>

</body>
</html>
